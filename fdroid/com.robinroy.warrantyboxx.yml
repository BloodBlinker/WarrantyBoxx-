AutoName: WarrantyBoxx

RepoType: git
Repo: https://github.com/BloodBlinker/WarrantyBoxx-.git

Builds:
  - versionName: 1.0.0
    versionCode: 11000
    commit: 7383538761abae4068a89a3778c28e3f8ceb8c47
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*FLUTTER_VERSION:\ '(.*)'/\1/p" .github/workflows/ci.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scanignore:
      - .flutter/bin/cache
    scandelete:
      - .flutter
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm

  - versionName: 1.0.0
    versionCode: 12000
    commit: 7383538761abae4068a89a3778c28e3f8ceb8c47
