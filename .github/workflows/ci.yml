name: CI

# Blueprint Section 9.2 — runs on every push to main and on every tag.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Drift / Riverpod / l10n)
        run: |
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n

      # Fail on any analyzer error or warning (Section 9.2).
      - name: Analyze
        run: flutter analyze --fatal-warnings --fatal-infos

      - name: Test
        run: flutter test --coverage

      - name: Performance tests
        run: flutter test --tags performance

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk/
          # github.ref_name will be 'main' or 'v1.0.0' depending on the trigger.
          # Strip the 'v' prefix if it exists to match the screenshot style (e.g. 1.0.0 instead of v1.0.0).
          VERSION_TAG=${GITHUB_REF_NAME#v}
          mv app-armeabi-v7a-release.apk WarrantyBoxx-${VERSION_TAG}-armeabi-v7a.apk
          mv app-arm64-v8a-release.apk WarrantyBoxx-${VERSION_TAG}-arm64-v8a.apk
          mv app-x86_64-release.apk WarrantyBoxx-${VERSION_TAG}-x86_64.apk

      # Custom F-Droid compliance check: no GMS, no network calls, no trackers.
      - name: F-Droid verification
        run: |
          VERSION_TAG=${GITHUB_REF_NAME#v}
          python3 tool/fdroid_verify.py build/app/outputs/flutter-apk/WarrantyBoxx-${VERSION_TAG}-arm64-v8a.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: warrantyboxx-release-apks
          path: build/app/outputs/flutter-apk/WarrantyBoxx-*.apk

      # On a tagged release, publish the APK to GitHub Releases (Section 9.2).
      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/WarrantyBoxx-*.apk
